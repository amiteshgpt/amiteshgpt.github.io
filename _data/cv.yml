cv:
  name: Amitesh Gupta
  #label: "Doctoral Candidate | Ecosystem–Climate Interactions | 6+ years in Remote Sensing Applications in Land-Water-Air Monitoring"
  email: amiteshgupta@iitb.ac.in
  label: "Doctoral Candidate, IIT Bombay<br/>Ecosystem–Climate Interactions<br/>Remote Sensing of Land–Water–Atmosphere"
  residence: Konnagar, West Bengal, India
  current_city: Mumbai, India
  image: ""
  summary: |
    <ul>
      <li>PhD researcher studying the dynamic interactions between the terrestrial ecosystem and climate conditions.</li>
      <li>Aim is to understand the widespread and complex patterns in ecosystem response to hydroclimatic dry extremes and elucidate their changing vulnerability.</li>
      <li>Explores plant–soil–atmosphere processes leveraging eddy-covariance flux data and examines physiological and structural changes induced by extreme dryness in the land and atmosphere integrating satellite observations, reanalysis datasets, and climate-model simulations.</li>
      <li>Motivated to simulate Earth's carbon and nitrogen cycles using an optimality-based dynamic global vegetation model to understand impacts of extreme perturbations in the energy and water cycles.</li>
    </ul>

  
