cv:
  name: Amitesh Gupta
  #label: "Doctoral Candidate | Ecosystem–Climate Interactions | 6+ years in Remote Sensing Applications in Land-Water-Air Monitoring"
  email: amiteshgupta@iitb.ac.in
  label: "Doctoral Candidate, IIT Bombay<br/>Ecosystem–Climate Interactions<br/>Remote Sensing of Land-Water–Air"
  residence: Konnagar, West Bengal, India
  current_city: Mumbai, India
  image: ""
  summary: |
    <ul>
      <li>I study the dynamic interactions between the terrestrial ecosystem and climate conditions.</li>
      <li>I aim to comprehend the complex patterns in ecosystem response to hydroclimatic dry extremes and elucidate their changes in widespread vulnerability.</li>
      <li>I explore plant–soil–atmosphere processes leveraging eddy-covariance flux data and examines physiological and structural changes induced by extreme dryness in the land and atmosphere integrating satellite observations, reanalysis datasets, and climate-model simulations.</li>
      <li>I am motivated to simulate Earth's carbon and nitrogen cycles using an optimality-based dynamic global vegetation model to understand impacts of extreme perturbations in the energy and water cycles.</li>
    </ul>

  
