    Projects:
      - name: Burnt-area detection using SAR
        summary: Developed a Sentinel-1 band-ratio-based classification workflow to detect burnt area amidst smoke, caused by wildfires in the Mediterranean region and tested over Canada.
      - name: Inundated-area mapping using SAR and Optical
        summary: Developed an image-classification workflow integrating Sentinel-1 SAR and Sentinel-2 spectral data to identify inundated / damaged areas using stacked ML in Goa's estuary.
      - name: Plant-resilience estimation using eddy-flux observations
        summary: Developed a pipeline based on long-term ground observations (FLUXNET) to estimate the resilience of different ecosystems from disturbances caused by drought or heatwave across the USA.
      - name: Drought-recovery prediction using climate-model simulations
        summary: Developed a workflow to predict the rate of drought recovery in different biomes and its changes from past to near-future using climate-model simulations.

